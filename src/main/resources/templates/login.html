<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Exam Management System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800&family=Inter:wght@400;500&display=swap');

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg:        #eeecdd;
            --panel-left:#d9d9d9;
            --primary:   #1a5276;
            --btn:       #23596d;
            --btn-hover: #1a4255;
            --error:     #e74c3c;
            --input-border: #1a5276;
            --radius:    28px;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: stretch;
            justify-content: stretch;
            min-height: 100vh;
        }

        .layout {
            display: flex;
            width: 100%;
            min-height: 100vh;
            padding: 20px;
            gap: 0;
        }

        /* ── LEFT PANEL ── */
        .left-panel {
            flex: 1;
            background: var(--panel-left);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100%;
            animation: fadeInLeft 0.6s ease both;
        }

        .logo-wrap img {
            width: 320px;
            max-width: 80%;
            display: block;
        }

        /* ── RIGHT PANEL ── */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 80px;
            gap: 24px;
            animation: fadeInRight 0.6s ease both;
        }

        .login-title {
            font-family: 'Raleway', sans-serif;
            font-size: 40px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 4px;
            align-self: flex-start;
            width: 100%;
            max-width: 420px;
        }

        /* ── INPUTS ── */
        .field-group {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .field-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--input-border);
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            color: #333;
            padding: 10px 2px;
            transition: border-color 0.2s;
        }

        .field-group input::placeholder {
            color: #888;
            font-size: 15px;
        }

        .field-group input:focus {
            border-bottom-color: var(--btn);
        }

        /* ── ERROR ── */
        .error-label {
            width: 100%;
            max-width: 420px;
            color: var(--error);
            font-size: 14px;
            min-height: 20px;
            display: none;
        }

        .error-label.visible {
            display: block;
        }

        /* ── BUTTON ── */
        .login-btn {
            width: 100%;
            max-width: 420px;
            background: var(--btn);
            color: #fff;
            font-family: 'Raleway', sans-serif;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 1px;
            border: none;
            border-radius: 8px;
            padding: 14px 0;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .login-btn:hover {
            background: var(--btn-hover);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-24px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(24px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 700px) {
            .layout        { flex-direction: column; padding: 12px; }
            .left-panel    { min-height: 220px; flex: none; border-radius: 20px; }
            .right-panel   { padding: 40px 24px; }
            .login-title   { font-size: 30px; }
        }
    </style>
</head>
<body>

<div class="layout">

    <!-- LEFT: Logo panel -->
    <div class="left-panel">
        <div class="logo-wrap">
            <img th:src="@{/images/logo.png}" src="/images/logo.png" alt="Examly Logo"/>
        </div>
    </div>

    <!-- RIGHT: Login form -->
    <div class="right-panel">

        <h1 class="login-title">LOGIN</h1>

        <!-- Error from Spring Security -->
        <div class="error-label"
             th:classappend="${param.error != null} ? 'visible' : ''"
             th:text="${param.error != null} ? 'Invalid username or password.' : ''">
        </div>

        <form th:action="@{/login}" method="post" style="width:100%;max-width:420px;display:flex;flex-direction:column;gap:24px;">

            <div class="field-group">
                <input type="text"
                       id="username"
                       name="username"
                       placeholder="Username"
                       autocomplete="username"
                       required/>
            </div>

            <div class="field-group">
                <input type="password"
                       id="password"
                       name="password"
                       placeholder="Password"
                       autocomplete="current-password"
                       required/>
            </div>

            <!-- CSRF token (Spring Security tự inject) -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <button type="submit" class="login-btn">Login</button>

        </form>

    </div>
</div>

</body>
</html>
