<th:block th:replace="~{layout/main-layout :: layout(~{:: #course-detail-content})}">

    <div id="course-detail-content">

        <div class="page-container">

            <div class="page-header">
                <h2 th:text="${course.courseName}">Tên khóa học</h2>
            </div>

            <div class="content-card">

                <div class="course-detail-layout">

                    <div class="outline-panel">

                        <h3>NỘI DUNG KHÓA HỌC</h3>

                        <div th:each="chapter, status : ${course.chapters}">

                            <div class="chapter-item" th:classappend="${status.first} ? 'active' : ''">
                                <i class="fas" th:classappend="${status.first} ? 'fa-chevron-down' : 'fa-chevron-right'"></i>
                                <span th:text="${chapter.title}">Chương 1: Giới thiệu</span>
                            </div>

                            <div class="lesson-list" th:if="${not #lists.isEmpty(chapter.lessons)}">
                                <a th:each="lesson : ${chapter.lessons}" th:href="@{/lessons/{id}(id=${lesson.lessonId})}">
                                    <i class="fas" th:classappend="${lesson.lessonType == 'VIDEO'} ? 'fa-link' : 'fa-file-alt'"></i>
                                    <span th:text="${lesson.title}">1.1 Tổng quan</span>
                                </a>
                            </div>
                        </div>

                        <div class="chapter-item active">
                            <i class="fas fa-chevron-down"></i>
                            KIỂM TRA
                        </div>

                        <div class="lesson-list">
                            <a th:each="exam : ${course.exams}" th:href="@{/exams/{id}(id=${exam.examId})}">
                                <span th:if="${exam.examName == 'Kiểm tra TX1'}">🟢 </span>
                                <span th:if="${exam.examName == 'Kiểm tra TX2'}">📄 </span>
                                <span th:if="${exam.examName == 'Kiểm tra cuối kỳ'}">🔒 </span>
                                <span th:text="${exam.examName}">Kiểm tra TX1</span>
                            </a>
                        </div>

                    </div>


                    <div class="detail-panel">

                        <div class="section-title">
                            KIỂM TRA
                        </div>

                        <div class="exam-item" th:each="exam : ${course.exams}">

                            <div class="exam-header">
                                <div class="exam-icon">
                                    <i class="fas fa-file-alt"></i>
                                </div>
                                <div>
                                    <small>BÀI TẬP</small>
                                    <h4 th:text="${exam.examName}">Kiểm tra TX1</h4>
                                </div>
                            </div>

                            <div class="exam-body">
                                <span th:text="${exam.examName == 'Kiểm tra TX1'} ? 'Thực hiện theo file hướng dẫn.' : 'Nội dung kiểm tra chương 2.'">
                                    Nội dung hướng dẫn làm bài...
                                </span>
                            </div>

                            <div class="exam-footer" th:if="${exam.closeDate != null}">
                                <i class="fas fa-lock"></i>
                                &nbsp;Available until:&nbsp;
                                <span th:text="${#temporals.format(exam.closeDate, 'dd-MM-yyyy HH:mm')}">27-01-2026 23:59</span>
                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</th:block>
