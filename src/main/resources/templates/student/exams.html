<th:block th:replace="~{layout/main-layout :: layout(~{:: #exam-content})}">
    <div id="exam-content">
        <div class="page-container">

            <div class="page-header">
                <h2>Kỳ thi của tôi</h2>
            </div>

            <div class="action-bar">
                <div th:replace="~{fragments/search-bar :: searchBar('/exams', 'Tìm kiếm kỳ thi...', 'student')}"></div>
                <div th:replace="~{fragments/filter-bar :: filterBar(
                    'filter-student',
                    ~{fragments/filter-select :: filterSelect('semester', ${semesterOptions}, 'HK', 'student')},
                    ~{fragments/filter-select :: filterSelect('year', ${yearOptions}, 'Năm học', 'student')}
                )}"></div>

                <div class="nav-arrows">
                    <button class="nav-btn">&laquo;</button>
                    <button class="nav-btn">&raquo;</button>
                </div>
            </div>

            <div class="content-card">
                <div class="exam-list">
                    <div class="exam-card" th:each="e : ${exams}">
                        <div class="exam-main">
                            <h3 th:text="${e.examName}">Giữa kỳ Java</h3>
                            <p>📚 <span th:text="${e.subjectName}">Java</span></p>
                            <p>📅 <span th:text="${#temporals.format(e.openDate, 'dd/MM/yyyy HH:mm')}">10/06/2026 09:00</span></p>
                            <p>⏱ <span th:text="${e.durationMinutes + ' phút'}">60 phút</span></p>
                        </div>
                        <div class="exam-action">
                            <button class="btn-start">Bắt đầu làm bài</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</th:block>
