<th:block th:replace="~{layout/main-layout :: layout(~{:: #exam-content})}">

    <div id="exam-content">

        <div class="page-container">

            <!-- HEADER -->
            <div class="page-header">
                <h2>CÁC KÌ THI CỦA BẠN</h2>
            </div>

            <!-- ACTION BAR (giữ cấu trúc sẵn) -->
            <div class="action-bar">

                <div>
                    <label>
                        <select class="filter-select">
                            <option>Môn học</option>
                        </select>
                    </label>
                </div>

                <div>
                    <label>
                        <select class="filter-select">
                            <option>Loại bài thi</option>
                        </select>
                    </label>
                </div>

                <div>
                    <label>
                        <select class="filter-select">
                            <option>Trạng thái</option>
                        </select>
                    </label>
                </div>

            </div>

            <!-- CONTENT CARD (QUAN TRỌNG - dùng lại scroll system) -->
            <div class="content-card">

                <!-- GRID -->
                <div class="exam-grid">

                    <div class="exam-card" th:each="e : ${exams}">

                        <div class="exam-title">
                            <h3 th:text="${e.examName}">IELTS Simulation Listening test 1</h3>
                        </div>

                        <div class="exam-info">

                            <div class="info-item">
                                <i class="fas fa-clock"></i>
                                <span th:text="${e.durationMinutes + ' phút'}">40 phút</span>
                            </div>

                            <div class="info-item">
                                <i class="fas fa-question-circle"></i>
                                <span th:text="${e.questionAmount + ' câu hỏi'}">40 câu hỏi</span>
                            </div>

                        </div>

                        <div class="exam-tags">
                            <span class="tag">#IELTS Academic</span>
                        </div>

                        <div class="exam-footer">
                            <a class="btn-detail"
                               th:href="@{'/exams/' + ${e.examId}}">
                                Chi tiết
                            </a>
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</th:block>
