<th:block th:replace="~{layout/main-layout :: layout(~{:: #exam-content})}">

    <div id="exam-content">

        <div class="exam-page">

            <!-- Header -->
            <div class="exam-banner">
                <h2>Kỳ Thi Sắp Tới</h2>

                <div class="exam-filters">
                    <select>
                        <option>Môn học</option>
                    </select>

                    <select>
                        <option>Khối</option>
                    </select>

                    <select>
                        <option>Trạng thái</option>
                    </select>
                </div>
            </div>

            <!-- Danh sách kỳ thi -->
            <div class="exam-grid">

                <div class="exam-card" th:each="e : ${exams}">

                    <div class="exam-header">

                        <div class="exam-subject-icon">
                            <i class="fas fa-book"></i>
                        </div>

                        <h3 th:text="${e.examName}">
                            Kiểm tra Giữa kỳ I - Toán
                        </h3>

                    </div>

                    <div class="exam-info">
                        <p>
                            <i class="fas fa-calendar-alt"></i>
                            <span th:text="${#temporals.format(e.openDate,'dd/MM/yyyy')}">
                                20/11/2025
                            </span>
                        </p>

                        <p>
                            <i class="fas fa-clock"></i>
                            <span th:text="${#temporals.format(e.openDate,'HH:mm')}">
                                09:00
                            </span>
                        </p>
                    </div>

                    <div class="exam-footer">

                        <span class="exam-status upcoming"
                              th:if="${e.status == 'UPCOMING'}">
                            Vào Thi
                        </span>

                        <span class="exam-status running"
                              th:if="${e.status == 'RUNNING'}">
                            Đang Thi
                        </span>

                        <span class="exam-status ended"
                              th:if="${e.status == 'ENDED'}">
                            Sắp Diễn Ra
                        </span>

                    </div>

                </div>

            </div>

        </div>

    </div>

</th:block>
