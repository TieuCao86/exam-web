<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="searchBar(actionUrl, placeholder, theme)">

  <form th:action="${actionUrl}" method="get"
        class="search-bar"
        th:classappend="${theme}">

    <input type="text"
           name="keyword"
           th:placeholder="${placeholder}">

  </form>

</div>

</html>
