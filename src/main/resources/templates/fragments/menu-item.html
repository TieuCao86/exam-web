<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="item(url, iconClass, text, active)">

    <a th:href="${url}"
       class="menu-item"
       th:classappend="${active} ? ' active' : ''">

        <i th:class="${iconClass}"></i>

        <span th:text="${text}"></span>

    </a>

</th:block>

</html>
