<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="filterSelect(name, options, placeholder, theme)">
    <select th:name="${name}"
            class="filter-select form-control"
            th:classappend="${theme}">
        <option value="" th:text="${placeholder}"></option>
        <option th:each="opt : ${options}"
                th:value="${opt.value}"
                th:text="${opt.label}">
        </option>
    </select>
</th:block>

</html>
